name: Generate engineering_blogs.opml file

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  generate:
    name: Generate engineering_blogs.opml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        # Upgrade to v4 for better stability and Node 20 support
        uses: actions/checkout@v4
        with:
          # Fetch all history so the auto-commit action can merge/push correctly
          fetch-depth: 0

      # ... (insert your generation logic here, e.g., the script that makes the .opml) ...

      - name: Auto-Commit engineering_blogs file if updated
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: auto-update engineering_blogs.opml [skip ci]"
          file_pattern: engineering_blogs.opml
          # Use github.head_ref for PRs, and github.ref_name for pushes
          branch: ${{ github.head_ref || github.ref_name }}
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com